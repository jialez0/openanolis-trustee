# Shared RWX storage for cross-pod policy/data synchronization.
# When enabled, a single ReadWriteMany PVC is created (or an existing one is used)
# and mounted into KBS/AS/Restful-AS/RVPS/Gateway to share policy/reference data.
sharedStorage:
  enabled: true
  # If provided, use this pre-created PVC; otherwise chart creates one.
  existingClaim: ""
  size: 20Gi
  storageClass: ""
  accessMode: ReadWriteMany

frontend:
