# Default values for coco-kbs.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

regionId:

domainName:

# KBS session routing (no app code changes): enable an in-cluster L7 proxy that
# pins a given kbs-session-id to a specific KBS Pod (StatefulSet ordinal).
kbsRouting:
  enabled: false
  replicaCount: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # Envoy image for the routing proxy.
  image:
    repository: envoyproxy/envoy
    tag: "v1.30.7"
    pullPolicy: IfNotPresent
  service:
    port: 8080

kbs:
  replicaCount: 3
  userKeysSecretName: kbs-auth-publickey
  resourceRepository: []
#    - repoName: default
#      type: security-policy
#      secretName: kbs-resource-security-policy-default


  image:
    repository: trustee-registry.cn-hangzhou.cr.aliyuncs.com/instance/kbs
    pullPolicy: IfNotPresent
    tag: "1.7.4"

  imagePullSecrets: []

  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
     allowPrivilegeEscalation: false
     capabilities:
       drop:
       - ALL
     seccompProfile:
       type: RuntimeDefault
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: LoadBalancer
    port: 8080
    loadBalancerType: intranet

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  nodeSelector: {}

  tolerations: []

  storage:
    enabled: true
    # Size of the PVC
    size: 20Gi
    # Name of the storage class to use. null for default Storage Class
    storageClass: alicloud-disk-alltype
    # Access Mode of the PVC
    accessMode: ReadWriteOnce

  aliyunKms:
    enabled: false
    kmsIntanceId:
    password: 
    clientKey:
    certPem:

