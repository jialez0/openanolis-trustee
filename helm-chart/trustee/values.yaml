    pullPolicy: IfNotPresent
    tag: "1.7.4"

  imagePullSecrets: []

  podAnnotations: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext:
     allowPrivilegeEscalation: false
     capabilities:
       add:
       - CHOWN
       - SETUID
       - SETGID
     seccompProfile:
       type: RuntimeDefault
    # readOnlyRootFilesystem: true
     runAsNonRoot: false
     runAsUser: 0

  service:
    type: LoadBalancer
    port: 8082
    loadBalancerType: intranet

