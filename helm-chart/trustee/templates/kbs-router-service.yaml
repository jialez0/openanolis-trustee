{{- if .Values.kbsRouting.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kbs-router
  labels:
    app: kbs-router
    {{- include "coco-kbs.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.kbsRouting.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app: kbs-router
    {{- include "coco-kbs.selectorLabels" . | nindent 4 }}
{{- end }}


