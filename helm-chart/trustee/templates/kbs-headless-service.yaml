{{- if .Values.kbsRouting.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kbs-headless
  labels:
    app: kbs
    {{- include "coco-kbs.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.kbs.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: kbs
    {{- include "coco-kbs.selectorLabels" . | nindent 4 }}
{{- end }}


